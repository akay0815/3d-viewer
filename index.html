<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AR.js Marker Test</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .hint {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      color: #222;
      padding: 10px 12px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="hint">
    Test: Wenn der Hiro-Marker erkannt wird, erscheint ein roter Würfel. Bitte Rückkamera verwenden und den Marker komplett ins Bild nehmen.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  >
    <a-marker preset="hiro">
      <a-box
        position="0 0.5 0"
        rotation="0 0 0"
        depth="0.3"
        height="0.3"
        width="0.3"
        color="red">
      </a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    async function forceBackCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        });
        stream.getTracks().forEach(track => track.stop());
      } catch (e) {
        console.log("Kamera-Vortest nicht möglich:", e);
      }
    }
    forceBackCamera();
  </script>
</body>
</html>
