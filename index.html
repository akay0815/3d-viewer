<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEISSNER AR Korb</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .hint {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      color: #222;
      padding: 10px 12px;
      border-radius: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="hint">
    Kamera auf den Hiro-Marker richten. Halte etwas Abstand und nimm den Marker komplett ins Bild.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-assets>
      <a-asset-item id="korbModel" src="./korb.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-entity
        gltf-model="#korbModel"
        position="0 0.5 0"
        rotation="0 0 0"
        scale="0.05 0.05 0.05">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
